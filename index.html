<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Resume Screening</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f7fb;
        color: #233;
      }
      .container {
        max-width: 900px;
        margin: 40px auto;
        background: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      form { display: grid; gap: 12px; }
      input, textarea, button { padding: 10px; font-size: 14px; border-radius: 8px; border: 1px solid #cbd5e1; }
      button { background: #2563eb; color: white; border: none; cursor: pointer; }
      .results { margin-top: 20px; }
      .result-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-top: 10px; }
      .pill { display: inline-block; background: #dbeafe; color: #1d4ed8; padding: 3px 8px; border-radius: 999px; font-size: 12px; margin-right: 6px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Smart Resume Screening</h1>
      <p>Upload resumes and compare them against a job description.</p>
      <form id="screening-form">
        <input id="jobtitle" name="jobtitle" placeholder="Job title" required />
        <textarea id="jobdescription" name="jobdescription" rows="5" placeholder="Job description" required></textarea>
        <input id="requiredskills" name="requiredskills" placeholder="Required skills, comma separated" required />
        <input id="resumes" name="resumes" type="file" multiple required />
        <button type="submit">Screen Resumes</button>
      </form>
      <div id="status" class="results"></div>
      <div id="results" class="results"></div>
    </div>

    <script>
      const form = document.getElementById('screening-form');
      const status = document.getElementById('status');
      const results = document.getElementById('results');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const formData = new FormData(form);
        status.innerHTML = '<p>Screening resumes...</p>';
        results.innerHTML = '';

        try {
          const response = await fetch('http://127.0.0.1:8003/screen-resumes', {
            method: 'POST',
            body: formData,
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || 'Request failed');
          }

          status.innerHTML = `<p>Processed ${data.totalresumes} resume(s).</p>`;
          results.innerHTML = data.results.map((item) => `
            <div class="result-card">
              <h3>${item.filename}</h3>
              <p><strong>Score:</strong> ${item.matchscore}%</p>
              <p>${item.explanation}</p>
              <div>
                ${item.matchedskills.map((skill) => `<span class="pill">✓ ${skill}</span>`).join('')}
                ${item.missingskills.map((skill) => `<span class="pill">✗ ${skill}</span>`).join('')}
              </div>
            </div>
          `).join('');
        } catch (error) {
          status.innerHTML = `<p style="color: #b91c1c;">${error.message}</p>`;
        }
      });
    </script>
  </body>
</html>
